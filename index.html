<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Code Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        h1 { color: #333; }
        .main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }
        .editor-box {
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
        }
        .toolbar {
            background: #2d2d2d;
            padding: 12px;
            display: flex;
            gap: 10px;
        }
        textarea {
            width: 100%;
            height: 550px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 14px;
            padding: 20px;
            border: none;
            outline: none;
            resize: none;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #10b981; color: white; }
        .error-item {
            background: #fee;
            border-left: 3px solid #ef4444;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        .preview {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Gemini Code Editor</h1>
            <p>AI-Powered Bug Fixer | Using Gemini API</p>
        </div>
        
        <div class="main">
            <div class="editor-box">
                <div class="toolbar">
                    <button class="btn-primary" id="fixBtn">🔍 Detect & Fix</button>
                    <button class="btn-success" id="applyBtn" disabled>✅ Apply Fix</button>
                </div>
                <textarea id="editor">// Buggy code example:
function calculateAverage(numbers) {
  let sum = 0;
  for(let i = 0; i <= numbers.length; i++) {
    sum += numbers[i];
  }
  return sum / numbers.length;
}

const scores = [10, 20, 30, 40];
console.log(calculateAverage(scores));</textarea>
            </div>
            
            <div>
                <div class="card">
                    <h3>🐛 Errors Found</h3>
                    <div id="errors">Click "Detect & Fix" to start</div>
                </div>
                <div class="card">
                    <h3>💡 AI Fix Preview</h3>
                    <div id="preview" class="preview">No fix yet</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="loading" class="loading">🤖 AI is thinking...</div>

    <script>
        const editor = document.getElementById('editor');
        const fixBtn = document.getElementById('fixBtn');
        const applyBtn = document.getElementById('applyBtn');
        const errorsDiv = document.getElementById('errors');
        const previewDiv = document.getElementById('preview');
        const loading = document.getElementById('loading');
        
        let fixedCode = '';
        
        async function detectAndFix() {
            const code = editor.value;
            if (!code.trim()) return alert('Write some code first!');
            
            loading.style.display = 'block';
            fixBtn.disabled = true;
            
            try {
                const res = await fetch('/api/fix-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                
                const data = await res.json();
                
                if (data.errors?.length) {
                    errorsDiv.innerHTML = data.errors.map(e => 
                        `<div class="error-item"><strong>⚠️ ${e.type}</strong><br>${e.description}<br><small>Line: ${e.line || '?'}</small></div>`
                    ).join('');
                } else {
                    errorsDiv.innerHTML = '<div style="color: #10b981;">✅ No errors found!</div>';
                }
                
                fixedCode = data.fixedCode || code;
                
                if (fixedCode !== code) {
                    previewDiv.innerHTML = fixedCode.substring(0, 500);
                    applyBtn.disabled = false;
                } else {
                    previewDiv.innerHTML = '✨ No fixes needed!';
                }
            } catch(err) {
                errorsDiv.innerHTML = `<div class="error-item">❌ Error: ${err.message}</div>`;
            } finally {
                loading.style.display = 'none';
                fixBtn.disabled = false;
            }
        }
        
        function applyFix() {
            if (fixedCode) {
                editor.value = fixedCode;
                applyBtn.disabled = true;
                previewDiv.innerHTML = '✅ Code fixed and applied!';
            }
        }
        
        fixBtn.addEventListener('click', detectAndFix);
        applyBtn.addEventListener('click', applyFix);
    </script>
</body>
</html>
